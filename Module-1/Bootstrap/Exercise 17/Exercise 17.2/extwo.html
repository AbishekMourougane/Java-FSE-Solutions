<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Icon Only Buttons</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <div class="container mt-5 text-center">

        <h2 class="text-primary mb-4">
            Bootstrap Icon Buttons
        </h2>

        <div class="d-flex justify-content-center gap-3">

            <button class="btn btn-primary rounded-circle p-3">

                <i class="bi bi-house-fill"></i>

            </button>

            <button class="btn btn-success rounded-circle p-3">

                <i class="bi bi-search"></i>

            </button>

           <button class="btn btn-danger rounded-circle p-3">

                <i class="bi bi-heart-fill"></i>

            </button>

            <button class="btn btn-dark rounded-circle p-3">

                <i class="bi bi-gear-fill"></i>

            </button>

            <button class="btn btn-warning rounded-circle p-3">

                <i class="bi bi-download"></i>

            </button>

        </div>

    </div>

</body>

</html>
